# Spring Boot Application Properties
spring.application.name=bus-booking-system

# Server Configuration
server.port=8080
#server.servlet.context-path=/api

# MySQL Database Configuration (Disabled)
#spring.datasource.url=jdbc:mysql://localhost:3306/bus_booking_db?useSSL=false&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:busbooking
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA/Hibernate Configuration (if using JPA)
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JDBC Template (for JDBC operations)
spring.jdbc.template.fetch-size=50

# Logging
logging.level.root=INFO
logging.level.com.busbooking=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration
server.forward-headers-strategy=framework

# Application Specific Properties
app.bus.tracking.update-interval=5000
app.bus.tracking.radius-km=10
app.fare.peak-hours.start=8
app.fare.peak-hours.end=10
app.fare.peak-hours.evening-start=17
app.fare.peak-hours.evening-end=20
