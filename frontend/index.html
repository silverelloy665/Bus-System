<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Landing - BusBooking</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #map { height: 400px; width: 100%; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">BusBooking</h1>
        <div id="authLinks">
            <button onclick="toggleAuth()" class="hover:underline">Login / Register</button>
        </div>
    </nav>

    <!-- Auth Modal / Form Container -->
    <div id="authContainer" class="max-w-md mx-auto mt-8 bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-bold mb-4">Login or Register</h2>
        <input type="text" id="username" placeholder="Username" class="w-full mb-3 p-2 border rounded">
        <input type="text" id="phone" placeholder="Phone" class="w-full mb-3 p-2 border rounded">
        <input type="password" id="password" placeholder="Password" class="w-full mb-4 p-2 border rounded">
        <div class="flex gap-2">
            <button onclick="handleLogin()" class="flex-1 bg-blue-600 text-white rounded p-2 hover:bg-blue-700">Login</button>
            <button onclick="handleRegister()" class="flex-1 bg-green-600 text-white rounded p-2 hover:bg-green-700">Register</button>
        </div>
        <p id="authMsg" class="text-red-500 mt-2 text-sm"></p>
    </div>

    <!-- Main Dashboard Container (Hidden by default) -->
    <div id="mainApp" class="hidden max-w-4xl mx-auto mt-6 px-4">
        <p class="text-lg mb-4">Welcome back, <span id="welcomeName" class="font-bold"></span>!</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2">
                <div class="bg-white p-4 rounded-lg shadow-md mb-6">
                    <h3 class="text-lg font-bold mb-3">Live Bus Map</h3>
                    <div id="map"></div>
                </div>
            </div>
            
            <div>
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <h3 class="text-lg font-bold mb-3">Quick Actions</h3>
                    <button onclick="window.location.href='booking.html'" class="w-full bg-blue-600 text-white rounded p-3 text-lg font-bold hover:bg-blue-700 mb-3 shadow">
                        Book a Bus
                    </button>
                    <!-- Simulated Fare Check Tool -->
                    <div class="border-t pt-3 mt-3">
                        <label class="block text-sm font-semibold mb-1">Check Dynamic Fare</label>
                        <select id="routeSelect" class="w-full p-2 border rounded mb-2">
                            <option value="1">Route 1 (Downtown)</option>
                            <option value="2">Route 2 (Suburbs)</option>
                        </select>
                        <button onclick="checkFare()" class="w-full bg-gray-200 text-gray-800 rounded p-2 hover:bg-gray-300">Check</button>
                        <p id="fareDisplay" class="font-bold text-blue-600 mt-2 text-lg"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Our Scripts -->
    <script src="api.js"></script>
    <script src="map.js"></script>
    <script>
        let currentUser = null;

        function toggleAuth() {
            document.getElementById('authContainer').classList.toggle('hidden');
        }

        async function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            try {
                const user = await api.loginUser(userIn, passIn);
                showApp(user);
            } catch (e) {
                document.getElementById('authMsg').innerText = "Invalid credentials!";
            }
        }

        async function handleRegister() {
            const userIn = document.getElementById('username').value;
            const phoneIn = document.getElementById('phone').value;
            const passIn = document.getElementById('password').value;
            try {
                // Pass basic payload
                const user = await api.registerUser({ username: userIn, phone: phoneIn, passwordHash: passIn });
                showApp(user);
            } catch (e) {
                document.getElementById('authMsg').innerText = "Registration failed!";
            }
        }

        function showApp(user) {
            currentUser = user;
            // Store locally so booking.html can use it
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Redirect to booking.html automatically
            window.location.href = 'booking.html';
        }

        async function checkFare() {
            const routeId = document.getElementById('routeSelect').value;
            try {
                const fare = await api.calculateFare(routeId);
                document.getElementById('fareDisplay').innerText = `Estimated Fare: ₹${fare.toFixed(2)}`;
            } catch (e) {
                document.getElementById('fareDisplay').innerText = `Error calculating fare`;
            }
        }

        // Auto login check
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            showApp(JSON.parse(savedUser));
        }
    </script>
</body>
</html>
