<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBooking - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .dark .glass { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans">
    <nav class="bg-blue-600 dark:bg-gray-800 text-white p-4 shadow-lg flex justify-between items-center transition-colors duration-300">
        <h1 class="text-2xl font-extrabold tracking-tight flex items-center gap-2">🚍 BusBooking</h1>
        <button onclick="toggleTheme()" class="px-4 py-2 rounded-full bg-blue-700 dark:bg-gray-700 hover:opacity-80 transition shadow-inner font-semibold">
            <span id="themeIcon">☀️ Light Mode</span>
        </button>
    </nav>

    <div class="flex-grow flex items-center justify-center p-4 bg-gradient-to-br from-blue-100 to-indigo-200 dark:from-gray-800 dark:to-gray-900">
        <div id="authContainer" class="glass w-full max-w-lg p-8 rounded-2xl shadow-2xl relative overflow-hidden transition-all duration-300">
            <!-- Top Accent Line -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-indigo-500"></div>
            
            <h2 id="formTitle" class="text-3xl font-bold mb-6 text-center">Welcome Back</h2>
            
            <!-- Toggle Login / Register / Admin -->
            <div class="flex bg-gray-200 dark:bg-gray-800 rounded-lg p-1 mb-6 shadow-inner text-sm sm:text-base">
                <button id="btnTabLogin" onclick="switchTab('login')" class="flex-1 py-2 rounded-md font-bold shadow bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 transition-all">Login</button>
                <button id="btnTabRegister" onclick="switchTab('register')" class="flex-1 py-2 rounded-md font-bold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all">Register</button>
                <button id="btnTabAdmin" onclick="switchTab('admin')" class="flex-1 py-2 rounded-md font-bold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all">Admin</button>
            </div>

            <div class="space-y-4 relative">
                <div>
                    <label class="block text-sm font-semibold mb-1">Username</label>
                    <input type="text" id="username" class="w-full p-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Enter your username">
                </div>

                <div id="registerFields" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Phone Number</label>
                        <input type="tel" id="phone" class="w-full p-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="10-digit mobile number">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">State</label>
                            <select id="state" onchange="updateCities()" class="w-full p-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="">Select State</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">City</label>
                            <select id="city" onchange="updateAreas()" class="w-full p-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="">Select City</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Area / Locality</label>
                        <select id="area" class="w-full p-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">Select Area</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Password</label>
                    <input type="password" id="password" class="w-full p-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Min 6 characters">
                </div>

                <p id="authMsg" class="text-red-500 dark:text-red-400 font-semibold text-center text-sm min-h-[20px]"></p>

                <button id="submitBtn" onclick="submitAuth()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold p-3 rounded-lg shadow-lg transform active:scale-[0.98] transition-all">
                    Log In
                </button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // Location Data for Dropdowns
        const locationData = {
            "Maharashtra": {
                "Mumbai": ["Bandra West", "Andheri East", "Dadar", "Juhu", "Colaba"],
                "Pune": ["Kothrud", "Hinjewadi", "Shivajinagar", "Viman Nagar"]
            },
            "Karnataka": {
                "Bengaluru": ["Koramangala", "Indiranagar", "Whitefield", "Jayanagar"],
                "Mysuru": ["Vijayanagar", "Gokulam", "Saraswathipuram"]
            },
            "Delhi": {
                "New Delhi": ["Connaught Place", "Hauz Khas", "Saket", "Vasant Kunj"]
            },
            "Tamil Nadu": {
                "Mangaluru": ["Hebbal", "Gokulam"]
            }
        };

        function populateStates() {
            const stateSelect = document.getElementById('state');
            for (const state in locationData) {
                stateSelect.add(new Option(state, state));
            }
        }

        function updateCities() {
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const areaSelect = document.getElementById('area');
            
            citySelect.innerHTML = '<option value="">Select City</option>';
            areaSelect.innerHTML = '<option value="">Select Area</option>';
            
            const selectedState = stateSelect.value;
            if (selectedState && locationData[selectedState]) {
                for (const city in locationData[selectedState]) {
                    citySelect.add(new Option(city, city));
                }
            }
        }

        function updateAreas() {
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const areaSelect = document.getElementById('area');
            
            areaSelect.innerHTML = '<option value="">Select Area</option>';
            
            const selectedState = stateSelect.value;
            const selectedCity = citySelect.value;
            
            if (selectedState && selectedCity && locationData[selectedState][selectedCity]) {
                locationData[selectedState][selectedCity].forEach(area => {
                    areaSelect.add(new Option(area, area));
                });
            }
        }

        // Initialize Dropdowns on Load
        populateStates();

        let currentMode = 'login';
        
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                document.getElementById('themeIcon').innerText = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                document.getElementById('themeIcon').innerText = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            toggleTheme(); // it defaults to dark structurally, so toggle switches to light
        }

        function switchTab(mode) {
            currentMode = mode;
            const regFields = document.getElementById('registerFields');
            const btnLogin = document.getElementById('btnTabLogin');
            const btnReg = document.getElementById('btnTabRegister');
            const btnAdmin = document.getElementById('btnTabAdmin');
            const submitBtn = document.getElementById('submitBtn');
            const title = document.getElementById('formTitle');
            const msg = document.getElementById('authMsg');
            msg.innerText = "";
            document.getElementById('password').value = "";

            // Reset tabs
            btnLogin.className = "flex-1 py-2 rounded-md font-bold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all";
            btnReg.className = "flex-1 py-2 rounded-md font-bold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all";
            btnAdmin.className = "flex-1 py-2 rounded-md font-bold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all";

            if (mode === 'login') {
                regFields.classList.add('hidden');
                btnLogin.className = "flex-1 py-2 rounded-md font-bold shadow bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 transition-all";
                submitBtn.innerText = "Log In";
                title.innerText = "Welcome Back";
            } else if (mode === 'register') {
                regFields.classList.remove('hidden');
                btnReg.className = "flex-1 py-2 rounded-md font-bold shadow bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 transition-all";
                submitBtn.innerText = "Create Account";
                title.innerText = "Join BusBooking";
            } else if (mode === 'admin') {
                regFields.classList.add('hidden');
                btnAdmin.className = "flex-1 py-2 rounded-md font-bold shadow bg-white dark:bg-gray-700 text-red-600 dark:text-red-400 transition-all";
                submitBtn.innerText = "Admin Log In";
                title.innerText = "Admin Portal";
            }
        }

        async function submitAuth() {
            const msg = document.getElementById('authMsg');
            const username = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');

            msg.innerText = "";

            if (!username || !pass) {
                msg.innerText = "Username and password are required.";
                return;
            }

            if (currentMode === 'login' || currentMode === 'admin') {
                try {
                    const user = await api.loginUser(username, pass);
                    if (currentMode === 'admin' && user.role !== 'ADMIN') {
                        msg.innerText = "Access denied. Not an administrator.";
                        return;
                    }
                    showApp(user);
                } catch (e) {
                    msg.innerText = "Invalid credentials!";
                }
            } else {
                const phone = document.getElementById('phone').value.trim();
                const state = document.getElementById('state').value.trim();
                const city = document.getElementById('city').value.trim();
                const area = document.getElementById('area').value.trim();

                if (!phone || phone.length < 10) {
                    msg.innerText = "Phone number must be at least 10 digits.";
                    return;
                }
                if (pass.length < 6) {
                    msg.innerText = "Password must be at least 6 characters.";
                    return;
                }

                if (area && city) {
                    submitBtn.innerText = "Locating Coordinates...";
                    try {
                        const query = encodeURIComponent(area + ', ' + city + ', ' + state);
                        const geoRes = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + query);
                        const geoData = await geoRes.json();
                        if(geoData && geoData.length > 0) {
                            localStorage.setItem('preferredLat', geoData[0].lat);
                            localStorage.setItem('preferredLng', geoData[0].lon);
                        }
                    } catch(err) {
                        console.warn("Geocoding failed.");
                    }
                }

                try {
                    submitBtn.innerText = "Joining...";
                    const user = await api.registerUser({ username: username, phone: phone, passwordHash: pass });
                    showApp(user);
                } catch (e) {
                    msg.innerText = "Registration failed. Username may exist.";
                    submitBtn.innerText = "Create Account";
                }
            }
        }

        function showApp(user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
            if (user.role === 'ADMIN') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'booking.html';
            }
        }

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            showApp(JSON.parse(savedUser));
        }
    </script>
</body>
</html>
