<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - BusBooking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; }
        .modal { background:var(--bg-card); padding:2rem; border-radius:12px; max-width:400px; width:90%; position:relative; max-height:80vh; overflow-y:auto; color:var(--text-main); }
        .close-btn { position:absolute; top:10px; right:15px; font-size:1.5rem; cursor:pointer; background:none; border:none; color:var(--text-main); }
        .btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; }
        .btn-outline { border:1px solid var(--primary); color:var(--primary); background:transparent; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold;}
        .btn-outline:hover { background:var(--primary); color:white; }
        .tx-list { margin-top:15px; border-top:1px solid var(--border); padding-top:10px; }
        .tx-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.9rem; }
        
        :root {
            --bg-body: #f4f7fb;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --border: #e5e7eb;
            --input-bg: #f9fafb;
            --nav-bg: #2563eb;
            --highlight: #eff6ff;
        }
        [data-theme="dark"] {
            --bg-body: #111827;
            --bg-card: #1f2937;
            --text-main: #f9fafb;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --success-hover: #16a34a;
            --border: #374151;
            --input-bg: #111827;
            --nav-bg: #1e3a8a;
            --highlight: rgba(59, 130, 246, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-body); color: var(--text-main);
            min-height: 100vh; transition: background-color 0.3s, color 0.3s;
        }

        nav {
            background-color: var(--nav-bg); color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 800; cursor: pointer; }
        .nav-actions { display: flex; gap: 1rem; align-items: center; }
        .theme-toggle {
            background-color: rgba(255, 255, 255, 0.2);
            color: white; border: none; padding: 0.5rem 1rem;
            border-radius: 9999px; cursor: pointer; font-weight: bold;
        }
        .logout { color: white; text-decoration: none; font-weight: bold; cursor: pointer; }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background-color: var(--bg-card); padding: 2rem;
            border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; }

        .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        input, select {
            flex-grow: 1; padding: 0.8rem 1rem; font-size: 1rem;
            border-radius: 8px; border: 1px solid var(--border);
            background-color: var(--input-bg); color: var(--text-main);
            outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); }
        .btn {
            background-color: var(--primary); color: white; border: none;
            padding: 0 1.5rem; border-radius: 8px; font-weight: bold;
            cursor: pointer; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn:hover { background-color: var(--primary-hover); }
        
        #map { height: 350px; width: 100%; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid var(--border); z-index: 1;}

        .info-panel {
            background-color: var(--input-bg); padding: 1.25rem;
            border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem;
        }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

        .fare-box {
            background-color: var(--highlight); border: 1px solid var(--primary);
            padding: 1.5rem; border-radius: 12px; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 1.5rem;
        }
        .fare-box span { font-size: 1.2rem; font-weight: bold; }
        .fare-amount { font-size: 2.2rem; font-weight: 800; color: var(--primary); }

        .radio-group { display: flex; gap: 1.5rem; margin-bottom: 2rem; }
        .radio-label { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; cursor: pointer; }

        .seat-class-group { display: flex; gap: 1rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem; width: 100%; }
        .seat-card {
            flex: 1; min-width: 120px; background: var(--bg-body); border: 2px solid var(--border);
            border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer;
            transition: all 0.2s;
        }
        .seat-card:hover { border-color: var(--primary); }
        .seat-card.selected { border-color: var(--primary); background: var(--highlight); box-shadow: 0 0 0 2px var(--primary); }
        .seat-card .icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .seat-card .title { font-weight: 600; margin-bottom: 0.25rem; }
        .seat-card .price { color: var(--success); font-weight: bold; margin-bottom: 0.5rem; }
        .seat-card .desc { font-size: 0.75rem; color: var(--text-main); opacity: 0.7; }

        .btn-success {
            background-color: var(--success); width: 100%; padding: 1.2rem;
            font-size: 1.25rem; border-radius: 12px;
        }
        .btn-success:hover { background-color: var(--success-hover); }

        #statusMsg { text-align: center; font-weight: bold; font-size: 1.1rem; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='index.html'">🚍 BusBooking</div>
        <div class="nav-actions">
            <button id="walletBadge" onclick="showWalletModal()" style="background:var(--success); color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; margin-right:10px;">💰 Wallet: ₹0</button>
            <button class="theme-toggle" id="themeIcon" onclick="toggleTheme()">☀️ Light Mode</button>
            <a class="logout" onclick="localStorage.removeItem('currentUser'); window.location.href='index.html'">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Live Bus Map & Booking</h2>
            
            <div class="search-bar">
                <input type="text" id="areaSearch" placeholder="Search locality or area (e.g. Bandra, Mumbai)">
                <button class="btn" onclick="searchArea()">Search</button>
            </div>

            <div id="map"></div>

            <div class="info-panel">
                <label>Available Nearby Buses</label>
                <div id="busList" style="margin-bottom: 10px; font-size: 0.95rem; color: var(--primary); font-weight: 600;">Loading buses...</div>
                <select id="busSelect"><option value="">-- Select a Bus --</option></select>
            </div>

            <div class="grid-2">
                <div>
                    <label>From Stop:</label>
                    <select id="fromStop" onchange="updateFare()"><option value="">-- Loading Stops --</option></select>
                </div>
                <div>
                    <label>To Stop:</label>
                    <select id="toStop" onchange="updateFare()"><option value="">-- Loading Stops --</option></select>
                </div>
            </div>

            <div class="fare-box">
                <span>Total Fare:</span>
                <div class="fare-amount" id="fareDisplay">₹0.00</div>
            </div>

            <label style="margin-bottom: 1rem; display: block;">Select Seat Class</label>
            <div class="seat-class-group">
                <div class="seat-card selected" onclick="selectSeatClass(this, 0, 'Economy')">
                    <div class="icon">🪑</div>
                    <div class="title">Economy</div>
                    <div class="price">+₹0</div>
                    <div class="desc">Basic seating, fan</div>
                </div>
                <div class="seat-card" onclick="selectSeatClass(this, 20, 'Business')">
                    <div class="icon">💺</div>
                    <div class="title">Business</div>
                    <div class="price">+₹20</div>
                    <div class="desc">Cushioned seat, AC</div>
                </div>
                <div class="seat-card" onclick="selectSeatClass(this, 50, 'Deluxe')">
                    <div class="icon">👑</div>
                    <div class="title">Deluxe</div>
                    <div class="price">+₹50</div>
                    <div class="desc">Premium seat, AC, charging</div>
                </div>
            </div>

            <label style="margin-bottom: 1rem;">Payment Method</label>
            <div class="radio-group" style="margin-bottom: 1.5rem;">
                <label class="radio-label"><input type="radio" name="payment" value="ONLINE" checked> Online Payment</label>
                <label class="radio-label"><input type="radio" name="payment" value="WALLET"> Wallet Transfer</label>
                <label class="radio-label"><input type="radio" name="payment" value="CASH"> Cash to Conductor</label>
            </div>

            <button class="btn btn-success" onclick="submitBooking()">Confirm Booking</button>
            <div id="statusMsg"></div>
        </div>
    </div>

    <!-- Wallet Modal -->
    <div class="modal-overlay" id="walletModal">
        <div class="modal">
            <button class="close-btn" onclick="closeWalletModal()">&times;</button>
            <h2 style="margin-top:0">My Wallet</h2>
            <h1 id="modalBalance" style="color:var(--success); text-align:center; margin:10px 0;">₹0.00</h1>
            
            <h4 style="margin-bottom:10px;">Quick Recharge</h4>
            <div class="btn-grid">
                <button class="btn-outline" onclick="setRechargeAmount(100)">+ ₹100</button>
                <button class="btn-outline" onclick="setRechargeAmount(250)">+ ₹250</button>
                <button class="btn-outline" onclick="setRechargeAmount(500)">+ ₹500</button>
                <button class="btn-outline" onclick="setRechargeAmount(1000)">+ ₹1000</button>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="number" id="customAmount" placeholder="Custom Amount" style="margin:0;">
                <button class="btn" style="width:auto; margin:0;" onclick="rechargeWallet()">Add Money</button>
            </div>

            <h4>Recent Transactions</h4>
            <div class="tx-list" id="txList">
                <!-- Transactions go here -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="api.js"></script>
    <script src="map.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                document.getElementById('themeIcon').innerText = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').innerText = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }
        if (localStorage.getItem('theme') === 'light') toggleTheme(); 

        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'index.html';

        let stopsCache = [];
        let baseFare = 0;
        let selectedSeatClassBonus = 0;       

        // Wallet Logic
        async function fetchWalletBalance() {
            try {
                const res = await fetch(`http://localhost:8080/api/wallet/balance/${currentUser.userId || currentUser.id}`);
                const bal = await res.json();
                document.getElementById('walletBadge').innerText = `💰 Wallet: ₹${bal}`;
                document.getElementById('modalBalance').innerText = `₹${bal.toFixed(2)}`;
            } catch(e) { console.error('Failed to fetch wallet info'); }
        }

        async function fetchTransactions() {
            try {
                const res = await fetch(`http://localhost:8080/api/wallet/transactions/${currentUser.userId || currentUser.id}`);
                const txs = await res.json();
                const list = document.getElementById('txList');
                list.innerHTML = txs.slice(0, 10).map(tx => `
                    <div class="tx-item">
                        <span style="color:${tx.type === 'CREDIT' ? 'var(--success)' : 'var(--danger)'}">
                            ${tx.type === 'CREDIT' ? '+' : '-'} ₹${tx.amount.toFixed(2)}
                        </span>
                        <span style="opacity:0.7">${new Date(tx.timestamp).toLocaleDateString()} - ${tx.description}</span>
                    </div>
                `).join('');
            } catch(e) { console.error('Failed to fetch transactions'); }
        }

        function showWalletModal() {
            document.getElementById('walletModal').style.display = 'flex';
            fetchWalletBalance();
            fetchTransactions();
        }

        function closeWalletModal() {
            document.getElementById('walletModal').style.display = 'none';
        }

        function setRechargeAmount(amt) {
            document.getElementById('customAmount').value = amt;
        }

        async function rechargeWallet() {
            const amt = parseFloat(document.getElementById('customAmount').value);
            if (!amt || amt <= 0) return alert("Enter valid amount");
            
            try {
                const res = await fetch(`http://localhost:8080/api/wallet/recharge`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.userId || currentUser.id, amount: amt, paymentMethod: 'Card/UPI' })
                });
                if (res.ok) {
                    document.getElementById('customAmount').value = '';
                    fetchWalletBalance();
                    fetchTransactions();
                    alert("Recharged successfully!");
                }
            } catch(e) { alert("Recharge failed."); }
        }
        
        // Setup initial wallet info
        setTimeout(fetchWalletBalance, 500);

        async function loadStops() {
            try {
                stopsCache = await api.getAllStops();
                const fromSelect = document.getElementById('fromStop');
                const toSelect = document.getElementById('toStop');
                
                fromSelect.innerHTML = '<option value="">-- Select Boarding Stop --</option>';
                toSelect.innerHTML = '<option value="">-- Select Destination Stop --</option>';
                
                stopsCache.forEach(stop => {
                    const text = `${stop.name} (${stop.city || 'Unknown'}, ${stop.area || 'Unknown'})`;
                    fromSelect.add(new Option(text, stop.stopId));
                    toSelect.add(new Option(text, stop.stopId));
                });
            } catch(e) { console.error("Could not load stops"); }
        }

        async function loadBuses() {
            try {
                const lat = currentUser.currentLat || 19.0760;
                const lng = currentUser.currentLng || 72.8777;
                
                const buses = await api.getNearbyBuses(lat, lng);
                const busSelect = document.getElementById('busSelect');
                busSelect.innerHTML = '<option value="">-- Select a Bus --</option>';
                document.getElementById('busList').innerText = `Found ${buses.length} buses nearby!`;
                
                buses.forEach(b => {
                    busSelect.add(new Option(`Bus #${b.id || b.busId || b.registrationNumber} (Route ${b.routeId})`, b.id || b.busId));
                });
            } catch(e) { document.getElementById('busList').innerText = 'Failed to load buses.'; }
        }

        async function updateFare() {
            const fromId = document.getElementById('fromStop').value;
            const toId = document.getElementById('toStop').value;
            const busSelect = document.getElementById('busSelect');
            
            if (!fromId || !toId) return;

            document.getElementById('fareDisplay').innerText = `Calculating...`;
            try {
                // If a bus is selected, get its routeId, else fallback to 1 for demo
                let routeId = 1;
                if (busSelect.value && busSelect.selectedIndex > 0) {
                    const text = busSelect.options[busSelect.selectedIndex].text;
                    const match = text.match(/Route (\d+)/);
                    if (match) routeId = parseInt(match[1]);
                }
                
                baseFare = await api.calculateFare(routeId);
                renderTotalFare();
            } catch(e) { 
                console.warn("Could not calculate fare dynamically"); 
                document.getElementById('fareDisplay').innerText = `₹--`;
            }
        }

        function selectSeatClass(element, bonus, className) {
            document.querySelectorAll('.seat-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            element.dataset.className = className;
            selectedSeatClassBonus = bonus;
            renderTotalFare();
        }

        function renderTotalFare() {
            if (baseFare > 0) {
                const total = baseFare + selectedSeatClassBonus;
                document.getElementById('fareDisplay').innerText = `₹${total.toFixed(2)}`;
            }
        }

        async function submitBooking() {
            const busId = document.getElementById('busSelect').value;
            const fromId = document.getElementById('fromStop').value;
            const toId = document.getElementById('toStop').value;
            const selectedClassCard = document.querySelector('.seat-card.selected');
            const seatClass = selectedClassCard ? selectedClassCard.dataset.className : 'Economy';
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            
            if(!busId) { alert("Please select a bus!"); return; }
            if(!fromId || !toId) { alert("Please select boarding and destination stops!"); return; }
            
            const msg = document.getElementById('statusMsg');
            
            const totalFare = baseFare + selectedSeatClassBonus;
            if (paymentMethod === 'WALLET' && totalFare > 0) {
                try {
                    const deductRes = await fetch(`http://localhost:8080/api/wallet/deduct`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUser.userId || currentUser.id, amount: totalFare })
                    });
                    if (!deductRes.ok) {
                        alert("Insufficient Wallet Balance!");
                        return;
                    }
                    setTimeout(fetchWalletBalance, 500);
                } catch(e) {
                    alert("Wallet deduction failed.");
                    return;
                }
            }

            try {
                // Add seatClass, fromStopId, toStopId, paymentMethod to payload
                const payload = { 
                    userId: currentUser.id || currentUser.userId, 
                    busId: parseInt(busId), 
                    fromStopId: parseInt(fromId),
                    toStopId: parseInt(toId),
                    seatClass: seatClass,
                    paymentMethod: paymentMethod,
                    status: "CONFIRMED" 
                };
                
                const res = await api.createBooking(payload);
                msg.style.color = "var(--success)";
                msg.innerHTML = `Success! Booking ID: #${res.id || res.bookingId}  <div style="font-size: 0.9em; margin-top: 5px;">Class: <b>${seatClass}</b></div>`;
            } catch(e) {
                msg.style.color = "var(--danger)";
                msg.innerText = `Failed to create booking.`;
            }
        }

        const prefLat = localStorage.getItem('preferredLat');
        const prefLng = localStorage.getItem('preferredLng');
        const lat = prefLat ? parseFloat(prefLat) : (currentUser?.currentLat || 19.0760); 
        const lng = prefLng ? parseFloat(prefLng) : (currentUser?.currentLng || 72.8777);
        initMap(lat, lng);
        loadBuses();
        loadStops();

        // When a bus is selected, update the map route
        document.getElementById('busSelect').addEventListener('change', async function() {
            updateFare(); // recalculate based on route
            
            const fromId = document.getElementById('fromStop').value;
            const toId = document.getElementById('toStop').value;
            
            if (this.value && this.selectedIndex > 0) {
                const text = this.options[this.selectedIndex].text;
                const match = text.match(/Route (\d+)/);
                if (match) {
                    const routeId = parseInt(match[1]);
                    // Assuming map.js handles this, else we provide a global function
                    if (typeof drawBusRoute === 'function') {
                        drawBusRoute(routeId, fromId, toId);
                    }
                }
            }
        });

        // Trigger route update when stops change as well
        document.getElementById('fromStop').addEventListener('change', function() {
            if (document.getElementById('busSelect').value) {
                document.getElementById('busSelect').dispatchEvent(new Event('change'));
            }
        });
        document.getElementById('toStop').addEventListener('change', function() {
            if (document.getElementById('busSelect').value) {
                document.getElementById('busSelect').dispatchEvent(new Event('change'));
            }
        });

        async function searchArea() {
            const query = document.getElementById('areaSearch').value;
            if (!query) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const newLat = parseFloat(data[0].lat); const newLng = parseFloat(data[0].lon);
                    map.setView([newLat, newLng], 14);
                    if (userMarker) userMarker.setLatLng([newLat, newLng]);
                    currentUser.currentLat = newLat; currentUser.currentLng = newLng;
                    loadBuses();
                } else { alert("Location not found."); }
            } catch(e) { alert("Search failed."); }
        }
    </script>
</body>
</html>
