<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - BusBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        #map { height: 300px; width: 100%; border-radius: 0.5rem; margin-bottom: 20px;}
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .dark .glass { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-sans min-h-screen">
    <nav class="bg-blue-600 dark:bg-gray-800 text-white p-4 shadow-lg flex justify-between items-center transition-colors duration-300">
        <h1 class="text-2xl font-extrabold tracking-tight flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">🚍 BusBooking</h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="px-4 py-2 rounded-full bg-blue-700 dark:bg-gray-700 hover:opacity-80 transition shadow-inner font-semibold">
                <span id="themeIcon">☀️ Light Mode</span>
            </button>
            <a href="index.html" class="hover:underline font-bold" onclick="localStorage.removeItem('currentUser')">Logout</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-8 bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl transition-colors duration-300 border dark:border-gray-700">
        <h2 class="text-2xl font-bold mb-6">Live Bus Map & Booking</h2>
        
        <!-- Location Search using Nominatim -->
        <div class="mb-4 flex gap-2">
            <input type="text" id="areaSearch" placeholder="Search locality or area (e.g., Bandra, Mumbai)" class="flex-1 p-3 border dark:border-gray-600 rounded-lg shadow-inner bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition" onkeydown="if(event.key === 'Enter') searchArea()">
            <button onclick="searchArea()" class="bg-blue-600 text-white font-bold px-6 py-3 rounded-lg hover:bg-blue-700 shadow transform active:scale-95 transition">Search</button>
        </div>

        <div id="map" class="shadow-md border dark:border-gray-700"></div>

        <div class="mb-5">
            <label class="block font-bold mb-2">Available Nearby Buses</label>
            <div id="busList" class="p-3 bg-gray-50 dark:bg-gray-700 border dark:border-gray-600 rounded-lg text-sm mb-3">Loading nearby buses...</div>
            <select id="busSelect" class="w-full p-3 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                <option value="">-- Select a Bus --</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-5">
            <div>
                <label class="block font-bold mb-2">From Stop ID:</label>
                <input type="number" id="fromStop" value="1" class="w-full p-3 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block font-bold mb-2">To Stop ID:</label>
                <input type="number" id="toStop" value="5" class="w-full p-3 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" onchange="updateFare()">
            </div>
        </div>

        <div class="mb-5 p-4 bg-blue-50 dark:bg-gray-700 border border-blue-200 dark:border-gray-600 rounded-xl shadow-inner">
            <div class="flex justify-between items-center">
                <span class="font-bold text-lg">Total Fare:</span>
                <span id="fareDisplay" class="font-bold text-3xl text-blue-600 dark:text-blue-400">₹0.00</span>
            </div>
            <p class="text-sm text-blue-600 dark:text-blue-300 mt-2 font-semibold" id="peakIndicator">Dynamic pricing applies based on route and time.</p>
        </div>

        <div class="mb-6">
            <label class="block font-bold mb-3">Payment Method</label>
            <div class="flex gap-6">
                <label class="flex items-center cursor-pointer"><input type="radio" name="payment" value="ONLINE" class="mr-2 w-5 h-5" checked> <span class="font-bold">Online Payment</span></label>
                <label class="flex items-center cursor-pointer"><input type="radio" name="payment" value="CASH" class="mr-2 w-5 h-5"> <span class="font-bold">Cash to Conductor</span></label>
            </div>
        </div>

        <button onclick="submitBooking()" class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white text-xl font-bold p-4 rounded-xl shadow-lg transform active:scale-[0.98] transition">
            Confirm Booking
        </button>
        <div class="mt-4"><p id="statusMsg" class="text-center font-bold text-lg"></p></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="api.js"></script>
    <script src="map.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                document.getElementById('themeIcon').innerText = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                document.getElementById('themeIcon').innerText = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            const html = document.documentElement;
            html.classList.remove('dark');
            document.getElementById('themeIcon').innerText = '🌙 Dark Mode';
        }

        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        async function loadBuses() {
            try {
                // Approximate default or user location
                const lat = currentUser.currentLat || 19.0760;
                const lng = currentUser.currentLng || 72.8777;
                
                const buses = await api.getNearbyBuses(lat, lng);
                const busSelect = document.getElementById('busSelect');
                document.getElementById('busList').innerText = `Found ${buses.length} buses nearby!`;
                
                buses.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b.id;
                    opt.text = `Bus #${b.id} (Route ${b.routeId})`;
                    busSelect.add(opt);
                });
                updateFare(); // initial load
            } catch(e) {
                document.getElementById('busList').innerText = 'Failed to load buses.';
            }
        }

        async function updateFare() {
            try {
                const fare = await api.calculateFare(1);
                document.getElementById('fareDisplay').innerText = `₹${fare.toFixed(2)}`;
            } catch(e) {
                console.warn("Could not calculate fare dynamically");
            }
        }

        async function submitBooking() {
            const busId = document.getElementById('busSelect').value;
            if(!busId) {
                alert("Please select a bus!"); return;
            }
            
            const booking = {
                userId: currentUser.id,
                busId: parseInt(busId),
                status: "CONFIRMED"
            };

            const statusMsg = document.getElementById('statusMsg');
            try {
                const res = await api.createBooking(booking);
                statusMsg.className = "text-center font-bold text-green-500 text-lg";
                statusMsg.innerText = `Success! Booking ID: #${res.id}`;
            } catch(e) {
                statusMsg.className = "text-center font-bold text-red-500 text-lg";
                statusMsg.innerText = `Failed to create booking.`;
            }
        }

        // Init
        const prefLat = localStorage.getItem('preferredLat');
        const prefLng = localStorage.getItem('preferredLng');
        const lat = prefLat ? parseFloat(prefLat) : (currentUser?.currentLat || 19.0760); 
        const lng = prefLng ? parseFloat(prefLng) : (currentUser?.currentLng || 72.8777);
        initMap(lat, lng);
        loadBuses();

        // Area Search using Nominatim API
        async function searchArea() {
            const query = document.getElementById('areaSearch').value;
            if (!query) return;

            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    const newLat = parseFloat(data[0].lat);
                    const newLng = parseFloat(data[0].lon);
                    
                    // Update Map and userMarker
                    map.setView([newLat, newLng], 14);
                    if (userMarker) {
                        userMarker.setLatLng([newLat, newLng]);
                    }
                    
                    // Update user's current loc in memory and fetch buses
                    currentUser.currentLat = newLat;
                    currentUser.currentLng = newLng;
                    loadBuses();
                } else {
                    alert("Location not found. Please try another area.");
                }
            } catch (err) {
                console.error("Geocoding failed:", err);
                alert("Failed to search area.");
            }
        }
    </script>
</body>
</html>
