<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BusBooking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg-body: #f4f7fb;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --border: #e5e7eb;
            --input-bg: #f9fafb;
            --panel-bg: #f8fafc;
            --nav-bg: #3730a3;
        }
        [data-theme="dark"] {
            --bg-body: #111827;
            --bg-card: #1f2937;
            --text-main: #f9fafb;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #34d399;
            --secondary-hover: #10b981;
            --border: #374151;
            --input-bg: #111827;
            --panel-bg: #1e293b;
            --nav-bg: #1e1b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-body); color: var(--text-main);
            min-height: 100vh; transition: background-color 0.3s, color 0.3s;
        }

        nav {
            background-color: var(--nav-bg); color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 800; cursor: pointer; }
        .nav-actions { display: flex; gap: 1rem; align-items: center; }
        .theme-toggle {
            background-color: rgba(255, 255, 255, 0.2); color: white; border: none;
            padding: 0.5rem 1rem; border-radius: 9999px; cursor: pointer; font-weight: bold;
        }
        .logout { color: white; text-decoration: none; font-weight: bold; cursor: pointer; }

        .container {
            max-width: 1200px; margin: 2rem auto; padding: 0 1rem;
            display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
        }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
        
        .card {
            background-color: var(--bg-card); padding: 1.5rem; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }
        
        h2 { font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        #map { height: 500px; width: 100%; border-radius: 12px; border: 1px solid var(--border); z-index: 1;}
        .map-help { font-size: 0.9rem; opacity: 0.7; margin-top: 10px; }

        .section {
            background-color: var(--panel-bg); padding: 1.25rem; border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 1.5rem;
        }
        h3 { color: var(--primary); margin-bottom: 1rem; font-size: 1.15rem; }
        
        input {
            width: 100%; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem;
            border: 1px solid var(--border); background-color: var(--input-bg);
            color: var(--text-main); margin-bottom: 0.75rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
        .flex { display: flex; gap: 0.75rem; }
        
        .btn {
            padding: 0.75rem 1.5rem; background-color: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: bold; font-size: 1rem;
            cursor: pointer; width: 100%; transition: background-color 0.2s;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-auto { width: auto; }
        
        .btn-sec { background-color: var(--secondary); margin-top: 0.5rem; }
        .btn-sec:hover { background-color: var(--secondary-hover); }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='index.html'">👨‍💼 Admin Console</div>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeIcon" onclick="toggleTheme()">☀️ Light Mode</button>
            <a class="logout" onclick="localStorage.removeItem('currentUser'); window.location.href='index.html'">Logout</a>
        </div>
    </nav>

    <div class="container">
        <!-- Map Panel -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>📍 Geo Live Tracking</h2>
                <button class="btn btn-auto" onclick="visualizeAllRoutes()" style="margin-bottom: 10px; background: var(--secondary);">Show All Routes</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="adminAreaSearch" placeholder="Search Area/City (e.g. Pune, Bangalore)" style="flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px;">
                <button class="btn" style="width: auto; padding: 0 20px;" onclick="adminSearchArea()">Search Map</button>
            </div>
            <div id="map"></div>
            <p class="map-help">* Click on the map to automatically fill latitude & longitude for new stops.</p>
        </div>

        <!-- Management Panel -->
        <div class="card">
            <div class="section">
                <h3>1. Create Stop</h3>
                <input type="text" id="stopName" placeholder="Stop Name (e.g. Pune Central)">
                <div class="grid-3" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <input type="text" id="stopArea" placeholder="Area">
                    <input type="text" id="stopCity" placeholder="City">
                    <input type="text" id="stopState" placeholder="State">
                </div>
                <div class="grid-2">
                    <input type="text" id="stopLat" placeholder="Lat (Click Map)" readonly style="background: rgba(0,0,0,0.05); cursor: not-allowed;">
                    <input type="text" id="stopLng" placeholder="Lng (Click Map)" readonly style="background: rgba(0,0,0,0.05); cursor: not-allowed;">
                </div>
                <button class="btn" onclick="createNewStop()">Add New Stop</button>
            </div>

            <div class="section">
                <h3>2. Define Route</h3>
                <div class="flex">
                    <input type="text" id="routeName" placeholder="Route Name" style="margin-bottom: 0;">
                    <button class="btn btn-auto" onclick="createRoute()">Create</button>
                </div>
            </div>

            <div class="section">
                <h3>3. Apply Fare Matrix</h3>
                <div class="grid-3">
                    <input type="number" id="fRouteId" placeholder="Route ID">
                    <input type="number" step="0.01" id="fBaseAmt" placeholder="Base Fare (₹)">
                    <input type="number" step="0.01" id="fPerKm" placeholder="Per KM (₹)">
                </div>
                <button class="btn btn-sec" onclick="applyFare()">Save Fare Profile</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="api.js"></script>
    <script src="map.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                document.getElementById('themeIcon').innerText = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').innerText = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }
        if (localStorage.getItem('theme') === 'light') toggleTheme();

        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'ADMIN') window.location.href = 'index.html';

        initMap(19.0760, 72.8777); 

        map.on('click', function(e) {
            document.getElementById('stopLat').value = e.latlng.lat.toFixed(6);
            document.getElementById('stopLng').value = e.latlng.lng.toFixed(6);
            L.marker([e.latlng.lat, e.latlng.lng]).addTo(map).bindPopup("New Stop").openPopup();
        });

        async function adminSearchArea() {
            const query = document.getElementById('adminAreaSearch').value;
            if (!query) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const newLat = parseFloat(data[0].lat); const newLng = parseFloat(data[0].lon);
                    map.setView([newLat, newLng], 13);
                } else { alert("Location not found."); }
            } catch(e) { alert("Search failed."); }
        }

        let adminPolylines = [];
        async function visualizeAllRoutes() {
            try {
                adminPolylines.forEach(p => map.removeLayer(p));
                adminPolylines = [];
                
                const routes = await api.getAllRoutes();
                const stops = await api.getAllStops();
                
                const stopMap = {};
                stops.forEach(s => stopMap[s.id || s.stopId] = s);
                
                routes.forEach(route => {
                    const start = stopMap[route.startStopId];
                    const end = stopMap[route.endStopId];
                    if(start && end && start.lat && start.lng && end.lat && end.lng) {
                        const latlngs = [
                            [start.lat, start.lng],
                            [end.lat, end.lng]
                        ];
                        const polyline = L.polyline(latlngs, {
                            color: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'), // Random color
                            weight: 4,
                            opacity: 0.8,
                            dashArray: '5, 10'
                        }).addTo(map);
                        adminPolylines.push(polyline);
                        
                        L.marker([start.lat, start.lng]).addTo(map).bindPopup(`<b>${start.name}</b><br>Start of ${route.name}`);
                        L.marker([end.lat, end.lng]).addTo(map).bindPopup(`<b>${end.name}</b><br>End of ${route.name}`);
                    }
                });
            } catch(e) { console.error("Could not load routes visually", e); }
        }

        async function createNewStop() {
            const name = document.getElementById('stopName').value;
            const area = document.getElementById('stopArea').value;
            const city = document.getElementById('stopCity').value;
            const state = document.getElementById('stopState').value;
            const lat = document.getElementById('stopLat').value;
            const lng = document.getElementById('stopLng').value;
            if(!name || !lat || !lng || !city || !state) return alert("Fill all required fields or click the map for coordinates");
            try {
                const s = await api.createStop({ 
                    name, 
                    area,
                    city,
                    state,
                    latitude: parseFloat(lat), 
                    longitude: parseFloat(lng),
                    isActive: true
                });
                alert(`Created Stop ID: #${s.id || s.stopId}`);
            } catch(e) { alert("Failed to create stop"); }
        }

        async function createRoute() {
            const name = document.getElementById('routeName').value;
            if(!name) return alert("Name required");
            try {
                const r = await api.createRoute({ name });
                alert(`Created Route ID: #${r.id}`);
            } catch(e) { alert("Failed to create route"); }
        }

        async function applyFare() {
            try {
                await api.saveFare({
                    routeId: parseInt(document.getElementById('fRouteId').value),
                    baseFare: parseFloat(document.getElementById('fBaseAmt').value),
                    perKmCharge: parseFloat(document.getElementById('fPerKm').value),
                    peakMultiplier: 1.0,
                    offPeakMultiplier: 1.0,
                    isActive: true
                });
                alert("Fare saved successfully!");
            } catch(e) { alert("Failed to apply fare"); }
        }
    </script>
</body>
</html>
