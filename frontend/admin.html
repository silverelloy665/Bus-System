<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BusBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900">
    <nav class="bg-gray-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">BusBooking Admin</h1>
        <div><button onclick="window.location.href='index.html'" class="hover:underline">Customer Site</button></div>
    </nav>

    <!-- Admin content container -->
    <div class="max-w-6xl mx-auto mt-6 px-4">
        
        <h2 class="text-2xl font-bold mb-4">Operations Dashboard</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Route Management -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-indigo-600">
                <h3 class="text-xl font-bold mb-4">Create New Route</h3>
                <div class="mb-3">
                    <label class="block font-bold mb-1">Route Name:</label>
                    <input type="text" class="w-full p-2 border rounded" placeholder="e.g. IT Park Express">
                </div>
                <div class="mb-3">
                    <label class="block font-bold mb-1">Stops (comma separated IDs):</label>
                    <input type="text" class="w-full p-2 border rounded" placeholder="1, 8, 12, 19">
                </div>
                <div class="mb-3">
                    <label class="flex items-center text-sm font-bold text-gray-700">
                        <input type="checkbox" class="mr-2"> Enable AI-Assisted Stop Optimization
                    </label>
                </div>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Save Route</button>
            </div>

            <!-- Fare Management -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-red-500">
                <h3 class="text-xl font-bold mb-4">Fare Management</h3>
                <div class="mb-4">
                    <label class="block font-bold mb-2">Select Route:</label>
                    <div class="flex gap-2">
                        <input type="number" id="fareRouteId" placeholder="Route ID" value="1" class="w-24 p-2 border rounded">
                        <button onclick="getSuggestedFare()" class="bg-gray-200 px-3 py-2 rounded hover:bg-gray-300">Get Suggested</button>
                    </div>
                </div>
                
                <div class="bg-gray-50 border p-3 rounded mb-4">
                    <p class="text-sm text-gray-500">System Suggested Base Fare:</p>
                    <p id="suggestedFare" class="text-2xl font-bold">₹0.00</p>
                </div>

                <div class="mb-4">
                    <label class="block font-bold mb-1">Override Base Fare (₹):</label>
                    <input type="number" id="newFare" placeholder="Enter new fare" class="w-full p-2 border rounded">
                </div>

                <button onclick="applyFare()" class="w-full bg-red-500 text-white font-bold p-2 rounded hover:bg-red-600">
                    Apply Override
                </button>

                <div id="fareWarning" class="mt-4 hidden p-3 rounded font-bold"></div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="api.js"></script>
    <script>
        let currentSuggested = 0;

        async function getSuggestedFare() {
            const routeId = document.getElementById('fareRouteId').value;
            try {
                // Using standard suggest endpoint
                const fare = await api.calculateFare(routeId); // or suggestFare if mapped, currently calculateFare handles base logic
                currentSuggested = fare;
                document.getElementById('suggestedFare').innerText = `₹${fare.toFixed(2)}`;
                document.getElementById('newFare').value = fare.toFixed(2);
            } catch(e) {
                alert("Failed to fetch suggested fare");
            }
        }

        async function applyFare() {
            const newFare = parseFloat(document.getElementById('newFare').value);
            const warningBox = document.getElementById('fareWarning');
            
            if(!currentSuggested) {
                alert("Please get suggested fare first!"); return; 
            }

            try {
                const validationMsg = await api.validateFare(currentSuggested, newFare);
                
                warningBox.classList.remove('hidden', 'bg-yellow-100', 'text-yellow-800', 'bg-red-100', 'text-red-800', 'bg-green-100', 'text-green-800');
                
                if (validationMsg.includes("Loss")) {
                    warningBox.innerText = `⚠️ ${validationMsg} - Fare is too low!`;
                    warningBox.classList.add('bg-yellow-100', 'text-yellow-800');
                } else if (validationMsg.includes("Unethical")) {
                    warningBox.innerText = `🚨 ${validationMsg} - Fare is too high!`;
                    warningBox.classList.add('bg-red-100', 'text-red-800');
                } else {
                    warningBox.innerText = `✅ Success: Fare Override Approved!`;
                    warningBox.classList.add('bg-green-100', 'text-green-800');
                }
            } catch(e) {
                alert("Validation service failed");
            }
        }
    </script>
</body>
</html>
